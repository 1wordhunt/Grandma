<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadece Senin İçin</title>
    <style>
        :root {
            --accent-color: #ff2e63;
            --bg-dark: #080808;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 1.5s ease;
        }

        /* Köşedeki Sayaç */
        #timer-box {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border-left: 3px solid var(--accent-color);
            font-family: monospace;
            font-size: 0.95rem;
            backdrop-filter: blur(5px);
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .container {
            text-align: center;
            z-index: 5;
            padding: 20px;
            transition: opacity 0.5s ease;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 600px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Özel Buton */
        .magic-button {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            color: white;
            background: transparent;
            border: 2px solid var(--accent-color);
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
        }

        .magic-button:hover {
            background: var(--accent-color);
            box-shadow: 0 0 25px var(--accent-color);
            transform: scale(1.05);
        }

        /* Butona Basınca Çıkacak Yazı */
        #surprise-text {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4.5rem;
            font-weight: 900;
            z-index: 100;
            text-align: center;
            width: 100%;
            text-shadow: 0 0 30px rgba(255,46,99,0.8);
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat {
            0% { transform: translate(-50%, -50%) scale(1); }
            14% { transform: translate(-50%, -50%) scale(1.1); }
            28% { transform: translate(-50%, -50%) scale(1); }
            42% { transform: translate(-50%, -50%) scale(1.1); }
            70% { transform: translate(-50%, -50%) scale(1); }
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="timer-box">
        <div>Birlikte geçen her anımız:</div>
        <div id="counter" style="color: var(--accent-color); font-weight: bold; margin-top: 5px;"></div>
    </div>

    <canvas id="stars"></canvas>

    <div class="container" id="main-content">
        <h1>Seninle Her Şey Başka</h1>
        <p>Bazı insanlar hayatınıza bir renk katar, sen benim hayatıma bütün bir gökyüzünü kattın.</p>
        <button class="magic-button" onclick="launchSurprise()">Buraya Tıkla</button>
    </div>

    <div id="surprise-text">İYİ Kİ VARSIN! ❤️</div>

    <script>
        // Sayaç Mantığı (243 gün, 5844 saat üzerinden toplam saniyeyi başlatıyoruz)
        let totalSeconds = (243 * 24 * 60 * 60); 

        function updateCounter() {
            totalSeconds++;
            const days = Math.floor(totalSeconds / (24 * 3600));
            const hours = Math.floor((totalSeconds % (24 * 3600)) / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;
            
            document.getElementById('counter').innerHTML = 
                `${days}g ${hours}s ${mins}dk ${secs}sn`;
        }
        // Sayacı hemen başlat ve her saniye güncelle
        updateCounter();
        setInterval(updateCounter, 1000);

        // Arka Plan Yıldız Animasyonu
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.y -= s.speed;
                if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // Sürpriz Fonksiyonu (Çalışmayan kısım düzeltildi)
        function launchSurprise() {
            // Arka planı derin mor/gece rengi yap
            document.body.style.background = "radial-gradient(circle, #2d004d 0%, #050505 100%)";
            
            // Eski içeriği soft bir şekilde gizle
            const mainContent = document.getElementById('main-content');
            mainContent.style.opacity = "0";
            
            setTimeout(() => {
                mainContent.style.display = "none";
                // Yeni yazıyı getir
                const surprise = document.getElementById('surprise-text');
                surprise.style.display = "block";
            }, 500);
        }
    </script>
</body>
</html>
