<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dread Manor: Razel's Curse - Final</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 15px; left: 15px; color: #ff0000; text-shadow: 2px 2px #000; z-index: 10; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #btn { position: absolute; bottom: 10%; right: 10%; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 35px; z-index: 100; visibility: hidden; }
        #msg { position: absolute; bottom: 20%; width: 100%; text-align: center; color: gold; font-size: 20px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui">DREAD MANOR: RAZEL'S CURSE <br> DEV: BURAK (RAZEL)</div>
    <div id="crosshair"></div>
    <div id="btn">✋</div>
    <div id="msg">Anahtarı bul ve evden kaç!</div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // --- CORE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 2, 25);
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const amb = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(amb);
        const flash = new THREE.PointLight(0xffffff, 1.5, 12);
        camera.add(flash);
        scene.add(camera);

        // --- MATERIALS ---
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x443333, roughness: 1 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const interactables = [];
        const collidables = [];
        let hasKey = false;

        // --- BUILDER ---
        function createBox(w, h, d, x, y, z, mat, col = true) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(x, y, z);
            scene.add(m);
            if(col) collidables.push(m);
            return m;
        }

        // 3 Katlı Ev
        for(let i=0; i<3; i++){
            const y = i * 4;
            createBox(20, 0.1, 20, 0, y, 0, floorMat, false); // Zemin
            createBox(20, 4, 0.5, 0, y+2, -10, wallMat); // Arka
            createBox(20, 4, 0.5, 0, y+2, 10, wallMat);  // Ön
            createBox(0.5, 4, 20, -10, y+2, 0, wallMat); // Sol
            createBox(0.5, 4, 20, 10, y+2, 0, wallMat);  // Sağ
        }

        // Merdiven (Rampa Sistemi - Garantili Çıkış)
        const stairRamp = createBox(3, 0.1, 9, 7, 2, 0, new THREE.MeshBasicMaterial({visible:false}));
        stairRamp.rotation.x = -0.52;
        for(let j=0; j<15; j++) createBox(3, 0.2, 0.6, 7, j*0.28, 4 - j*0.5, wallMat, false);

        // Anahtar (Altın Küre olarak temsil edildi)
        const key = createBox(0.3, 0.3, 0.3, -5, 1, -5, new THREE.MeshStandardMaterial({color: 'gold'}));
        interactables.push({ mesh: key, type: 'key' });

        // Çıkış Kapısı
        const door = createBox(2, 3.5, 0.2, 0, 1.75, 9.8, new THREE.MeshStandardMaterial({color: 0x3d2b1a}));
        interactables.push({ mesh: door, type: 'exit' });

        // --- GRANNY AI ---
        const granny = new THREE.Group();
        granny.add(new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.2), new THREE.MeshStandardMaterial({color: 0x330000})));
        const eyes = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 'red'}));
        eyes.position.set(0, 0.6, 0.3);
        granny.add(eyes);
        granny.position.set(0, 1, -8);
        scene.add(granny);

        // --- CONTROLS ---
        let yaw = 0, pitch = 0, vel = new THREE.Vector3();
        let touchX = null, touchY = null;

        window.addEventListener('touchstart', (e) => {
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            const dx = e.touches[0].clientX - touchX;
            const dy = e.touches[0].clientY - touchY;
            if (e.touches[0].clientX < window.innerWidth / 2) {
                const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                fwd.y = 0; fwd.normalize();
                vel.addScaledVector(fwd, -dy * 0.00005);
            } else {
                yaw -= dx * 0.005;
                pitch -= dy * 0.005;
                pitch = Math.max(-1.4, Math.min(1.4, pitch));
            }
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', () => vel.set(0,0,0));
        document.getElementById('btn').onclick = () => {
            interactables.forEach((obj, i) => {
                if(camera.position.distanceTo(obj.mesh.position) < 3) {
                    if(obj.type === 'key') { hasKey = true; scene.remove(obj.mesh); document.getElementById('msg').innerText = "Anahtar alındı! Çıkışa git."; }
                    if(obj.type === 'exit' && hasKey) { document.getElementById('msg').innerText = "EVREN KURTULDU! KAZANDIN."; }
                    if(obj.type === 'exit' && !hasKey) { document.getElementById('msg').innerText = "Kapı kilitli! Anahtar lazım."; }
                }
            });
        };

        camera.position.set(0, 1.7, 5);

        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            
            // Collision Check
            const nextPos = camera.position.clone().add(vel);
            const ray = new THREE.Raycaster(camera.position, vel.clone().normalize(), 0, 1);
            if(ray.intersectObjects(collidables).length === 0) camera.position.copy(nextPos);
            vel.multiplyScalar(0.9);

            // Granny AI Move
            const gDir = new THREE.Vector3().subVectors(camera.position, granny.position).normalize();
            gDir.y = 0;
            granny.position.add(gDir.multiplyScalar(0.04));
            granny.lookAt(camera.position.x, 1, camera.position.z);
            if(granny.position.distanceTo(camera.position) < 1) document.getElementById('msg').innerText = "YAKALANDIN! OYUN BİTTİ.";

            // UI
            const btn = document.getElementById('btn');
            btn.style.visibility = "hidden";
            interactables.forEach(obj => { if(camera.position.distanceTo(obj.mesh.position) < 3) btn.style.visibility = "visible"; });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
