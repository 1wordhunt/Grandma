<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Razel 3D Countryball Soccer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; text-shadow: 2px 2px 5px black; }
        
        /* Mobil Butonlar */
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; box-sizing: border-box; }
        .btn { 
            width: 70px; height: 70px; background: rgba(0,0,0,0.6); border: 2px solid white; 
            border-radius: 50%; color: white; font-weight: bold; font-size: 12px;
            display: flex; align-items: center; justify-content: center; touch-action: none;
        }
        #dash-btn { background: rgba(231, 76, 60, 0.7); }
        #jump-btn { background: rgba(52, 152, 219, 0.7); }
    </style>
</head>
<body>

    <div id="ui">
        <h1>RAZEL 3D CUP</h1>
        <p>SKOR: <span id="score">0</span> | RÜTBE: ÇAYLAK BRONZ</p>
    </div>

    <div class="controls">
        <div class="btn" id="move-left">SOL</div>
        <div class="btn" id="move-right">SAĞ</div>
        <div class="btn" id="jump-btn">ZIPLA</div>
        <div class="btn" id="dash-btn">DASH</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. SAHNE VE KAMERA KURULUMU ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. IŞIKLAR ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 10, 5);
        scene.add(sunLight);

        // --- 3. SAHA (3D ÇİM) ---
        const groundGeo = new THREE.BoxGeometry(20, 1, 40);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x2ecc71 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.y = -0.5;
        scene.add(ground);

        // --- 4. PLAYER (TÜRKİYE) ---
        const playerGeo = new THREE.SphereGeometry(1, 32, 32);
        const playerMat = new THREE.MeshPhongMaterial({ color: 0xe74c3c }); // Kırmızı
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(-3, 1, 10);
        scene.add(player);

        // --- 5. RAKİP (HOLLANDA - TEST) ---
        const enemyMat = new THREE.MeshPhongMaterial({ color: 0xffa500 }); // Turuncu
        const enemy = new THREE.Mesh(playerGeo, enemyMat);
        enemy.position.set(3, 1, -10);
        scene.add(enemy);

        // --- 6. TOP ---
        const ballGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const ballMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(0, 0.6, 0);
        scene.add(ball);

        camera.position.set(0, 10, 20);
        camera.lookAt(0, 0, 0);

        // --- 7. HAREKET VE KONTROLLER ---
        let moveState = { left: false, right: false };
        let velocityY = 0;
        let isGrounded = true;

        // Mobil Buton Eventleri
        document.getElementById('move-left').ontouchstart = () => moveState.left = true;
        document.getElementById('move-left').ontouchend = () => moveState.left = false;
        document.getElementById('move-right').ontouchstart = () => moveState.right = true;
        document.getElementById('move-right').ontouchend = () => moveState.right = false;
        
        document.getElementById('jump-btn').ontouchstart = () => {
            if(isGrounded) { velocityY = 0.2; isGrounded = false; }
        };

        document.getElementById('dash-btn').ontouchstart = () => {
            player.position.z -= 2; // Hızlı ileri atılma
        };

        // Klavye Desteği (PC için)
        window.onkeydown = (e) => {
            if(e.key === 'a') moveState.left = true;
            if(e.key === 'd') moveState.right = true;
            if(e.key === ' ' && isGrounded) { velocityY = 0.2; isGrounded = false; }
        };
        window.onkeyup = (e) => {
            if(e.key === 'a') moveState.left = false;
            if(e.key === 'd') moveState.right = false;
        };

        // --- 8. OYUN DÖNGÜSÜ ---
        function animate() {
            requestAnimationFrame(animate);

            // Oyuncu Hareket
            if(moveState.left) player.position.x -= 0.1;
            if(moveState.right) player.position.x += 0.1;

            // Yerçekimi
            player.position.y += velocityY;
            if(player.position.y > 1) {
                velocityY -= 0.01;
            } else {
                player.position.y = 1;
                isGrounded = true;
                velocityY = 0;
            }

            // Topu Takip Et (Basit Kamera)
            camera.position.x = player.position.x * 0.5;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
