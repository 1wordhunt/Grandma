<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏚️ GRANNY KONAĞI – SADECE EV (3 KATLI)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #111;
        }
        
        #gameCanvas {
            width: 100vw;
            height: 100vh;
            display: block;
            outline: none;
            touch-action: none;
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid #8b4513;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        #controls-left {
            position: fixed;
            bottom: 100px;
            left: 30px;
            width: 140px;
            height: 140px;
            background: rgba(139, 69, 19, 0.3);
            border: 3px solid #8b4513;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(5px);
            touch-action: none;
            box-shadow: 0 0 25px rgba(139,69,19,0.3);
        }
        
        #joystick-inner {
            width: 70px;
            height: 70px;
            background: rgba(139, 69, 19, 0.7);
            border-radius: 50%;
            transition: transform 0.03s;
            box-shadow: 0 0 20px #8b4513;
            border: 2px solid #cd853f;
        }
        
        #controls-right {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 50vw;
            height: 100vh;
            background: transparent;
            z-index: 150;
            touch-action: none;
        }
        
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #f5deb3;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 16px;
            z-index: 100;
            border: 1px solid #cd853f;
            backdrop-filter: blur(5px);
        }
        
        @media (max-width: 768px) {
            #info { font-size: 14px; padding: 8px 16px; bottom: 15px; left: 15px; }
            #controls-left { width: 110px; height: 110px; left: 20px; bottom: 80px; }
            #joystick-inner { width: 55px; height: 55px; }
            #status { font-size: 14px; padding: 8px 16px; }
        }
    </style>
</head>
<body>
    <div id="status">🏚️ GRANNY KONAĞI | 3 KAT | 25+ ODA | GERÇEKÇİ</div>
    <div id="info">👇 Sol joystick hareket | 👉 Sağ ekranı kaydır bakış</div>
    
    <div id="controls-left">
        <div id="joystick-inner"></div>
    </div>
    
    <div id="controls-right"></div>
    
    <canvas id="gameCanvas"></canvas>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        (function() {
            // -------------------- DEĞİŞKENLER --------------------
            let scene, camera, renderer;
            let player = { x: 5, y: 1.7, z: 5 };
            let keys = {};
            let isMobile = false;
            
            // Işıklar
            let ambientLight, dirLight, torchLight;
            
            // Joystick
            let joystickActive = false;
            let joystickPos = { x: 0, y: 0 };
            let moveDirection = { x: 0, z: 0 };
            
            // Kamera
            let pitch = 0;
            let yaw = 0;
            let touchStartX = 0;
            let touchStartY = 0;
            
            // -------------------- BAŞLANGIÇ --------------------
            window.onload = function() {
                detectMobile();
                initScene();
                createMansion();
                animate();
            };
            
            function detectMobile() {
                isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            }
            
            function initScene() {
                // Sahne
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x111122);
                scene.fog = new THREE.Fog(0x111122, 20, 50);
                
                // Kamera
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(5, 1.7, 5);
                
                // Renderer
                renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true, alpha: false });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.shadowMap.bias = 0.00005;
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                
                // Işık sistemi
                ambientLight = new THREE.AmbientLight(0x404060);
                scene.add(ambientLight);
                
                dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
                dirLight.position.set(10, 20, 10);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.width = 2048;
                dirLight.shadow.mapSize.height = 2048;
                dirLight.shadow.camera.near = 0.5;
                dirLight.shadow.camera.far = 50;
                dirLight.shadow.camera.left = -20;
                dirLight.shadow.camera.right = 20;
                dirLight.shadow.camera.top = 20;
                dirLight.shadow.camera.bottom = -20;
                dirLight.shadow.bias = -0.0005;
                scene.add(dirLight);
                
                // İkinci ışık (iç mekan için)
                const fillLight = new THREE.PointLight(0xffaa88, 0.4, 30);
                fillLight.position.set(0, 5, 0);
                scene.add(fillLight);
                
                // El feneri efekti
                torchLight = new THREE.PointLight(0xffcc99, 1.2, 20);
                torchLight.position.copy(camera.position);
                scene.add(torchLight);
                
                // Yardımcı ışıklar
                for (let i = 0; i < 8; i++) {
                    const light = new THREE.PointLight(0xaa8866, 0.2, 15);
                    light.position.set(Math.sin(i)*8, 3 + i*0.5, Math.cos(i)*8);
                    scene.add(light);
                }
                
                // Olaylar
                window.addEventListener('resize', onResize);
                window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
                window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
                
                // Mouse bakış
                document.addEventListener('mousemove', onMouseMove);
                document.getElementById('gameCanvas').addEventListener('click', () => {
                    document.getElementById('gameCanvas').requestPointerLock();
                });
                
                // Mobil kontroller
                setupMobileControls();
            }
            
            function setupMobileControls() {
                const leftCtrl = document.getElementById('controls-left');
                const inner = document.getElementById('joystick-inner');
                
                leftCtrl.addEventListener('touchstart', (e) => {
                    joystickActive = true;
                    e.preventDefault();
                });
                
                leftCtrl.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = leftCtrl.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    let dx = touch.clientX - centerX;
                    let dy = touch.clientY - centerY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const max = rect.width / 2;
                    
                    if (dist > max) {
                        dx = (dx / dist) * max;
                        dy = (dy / dist) * max;
                    }
                    
                    inner.style.transform = `translate(${dx}px, ${dy}px)`;
                    moveDirection.x = dx / max;
                    moveDirection.z = -dy / max;
                });
                
                leftCtrl.addEventListener('touchend', () => {
                    joystickActive = false;
                    inner.style.transform = 'translate(0px, 0px)';
                    moveDirection.x = 0;
                    moveDirection.z = 0;
                });
                
                // Sağ ekran kaydırma
                const rightCtrl = document.getElementById('controls-right');
                rightCtrl.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                });
                
                rightCtrl.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const dx = (touch.clientX - touchStartX) * 0.01;
                    const dy = (touch.clientY - touchStartY) * 0.01;
                    
                    yaw -= dx;
                    pitch -= dy;
                    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
                    
                    camera.rotation.y = yaw;
                    camera.rotation.x = pitch;
                    
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                });
            }
            
            function onMouseMove(e) {
                if (document.pointerLockElement === document.getElementById('gameCanvas')) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
                    
                    camera.rotation.y = yaw;
                    camera.rotation.x = pitch;
                }
            }
            
            // -------------------- GERÇEKÇİ KONAK --------------------
            function createMansion() {
                // Malzemeler
                const brickMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xaa5533,
                    roughness: 0.7,
                    emissive: 0x000000
                });
                
                const woodMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x8b5a2b,
                    roughness: 0.8,
                    emissive: 0x000000
                });
                
                const floorMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x5d3a1a,
                    roughness: 0.9,
                    emissive: 0x000000
                });
                
                const darkWoodMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x4a2c1a,
                    roughness: 0.9,
                    emissive: 0x000000
                });
                
                const roofMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x332211,
                    roughness: 0.8,
                    emissive: 0x000000
                });
                
                // Zemin (temel)
                const ground = new THREE.Mesh(
                    new THREE.PlaneGeometry(40, 40),
                    new THREE.MeshStandardMaterial({ color: 0x2a3a2a, roughness: 0.9 })
                );
                ground.rotation.x = -Math.PI / 2;
                ground.position.y = -0.1;
                ground.receiveShadow = true;
                scene.add(ground);
                
                // Çim efekti için küçük yeşil noktalar (opsiyonel)
                for (let i = 0; i < 200; i++) {
                    const grass = new THREE.Mesh(
                        new THREE.ConeGeometry(0.05, 0.1, 4),
                        new THREE.MeshStandardMaterial({ color: 0x2a5a2a })
                    );
                    grass.position.set(Math.random()*30-15, 0, Math.random()*30-15);
                    grass.castShadow = true;
                    grass.receiveShadow = true;
                    scene.add(grass);
                }
                
                // ----- ANA BİNA (3 KAT) -----
                const mainWidth = 12;
                const mainDepth = 10;
                const floorHeight = 3;
                
                // 1. KAT DUVARLARI
                createWall(0, floorHeight/2, -mainDepth/2, mainWidth, floorHeight, 0.4, brickMaterial); // arka
                createWall(0, floorHeight/2, mainDepth/2, mainWidth, floorHeight, 0.4, brickMaterial); // ön
                createWall(-mainWidth/2, floorHeight/2, 0, 0.4, floorHeight, mainDepth, brickMaterial); // sol
                createWall(mainWidth/2, floorHeight/2, 0, 0.4, floorHeight, mainDepth, brickMaterial); // sağ
                
                // 1. KAT ZEMİNİ
                const floor1 = new THREE.Mesh(
                    new THREE.BoxGeometry(mainWidth, 0.2, mainDepth),
                    floorMaterial
                );
                floor1.position.set(0, 0, 0);
                floor1.receiveShadow = true;
                floor1.castShadow = true;
                scene.add(floor1);
                
                // 2. KAT DUVARLARI
                createWall(0, floorHeight + floorHeight/2, -mainDepth/2, mainWidth, floorHeight, 0.4, brickMaterial);
                createWall(0, floorHeight + floorHeight/2, mainDepth/2, mainWidth, floorHeight, 0.4, brickMaterial);
                createWall(-mainWidth/2, floorHeight + floorHeight/2, 0, 0.4, floorHeight, mainDepth, brickMaterial);
                createWall(mainWidth/2, floorHeight + floorHeight/2, 0, 0.4, floorHeight, mainDepth, brickMaterial);
                
                // 2. KAT ZEMİNİ
                const floor2 = new THREE.Mesh(
                    new THREE.BoxGeometry(mainWidth, 0.2, mainDepth),
                    woodMaterial
                );
                floor2.position.set(0, floorHeight, 0);
                floor2.receiveShadow = true;
                floor2.castShadow = true;
                scene.add(floor2);
                
                // 3. KAT DUVARLARI (çatı katı)
                createWall(0, floorHeight*2 + floorHeight/2, -mainDepth/2, mainWidth, floorHeight, 0.4, woodMaterial);
                createWall(0, floorHeight*2 + floorHeight/2, mainDepth/2, mainWidth, floorHeight, 0.4, woodMaterial);
                createWall(-mainWidth/2, floorHeight*2 + floorHeight/2, 0, 0.4, floorHeight, mainDepth, woodMaterial);
                createWall(mainWidth/2, floorHeight*2 + floorHeight/2, 0, 0.4, floorHeight, mainDepth, woodMaterial);
                
                // 3. KAT ZEMİNİ
                const floor3 = new THREE.Mesh(
                    new THREE.BoxGeometry(mainWidth, 0.2, mainDepth),
                    darkWoodMaterial
                );
                floor3.position.set(0, floorHeight*2, 0);
                floor3.receiveShadow = true;
                floor3.castShadow = true;
                scene.add(floor3);
                
                // ÇATI
                const roof = new THREE.Mesh(
                    new THREE.ConeGeometry(7, 2, 4),
                    roofMaterial
                );
                roof.position.set(0, floorHeight*3, 0);
                roof.rotation.y = Math.PI/4;
                roof.castShadow = true;
                roof.receiveShadow = true;
                scene.add(roof);
                
                // ----- İÇ BÖLMELER (ODALAR) -----
                
                // Koridor duvarları (1. kat)
                createWall(-2, 1.5, 0, 0.3, 3, 4, woodMaterial);
                createWall(2, 1.5, 0, 0.3, 3, 4, woodMaterial);
                createWall(0, 1.5, -3, 4, 3, 0.3, woodMaterial);
                createWall(0, 1.5, 3, 4, 3, 0.3, woodMaterial);
                
                // Koridor duvarları (2. kat)
                createWall(-2, 4.5, 0, 0.3, 3, 4, woodMaterial);
                createWall(2, 4.5, 0, 0.3, 3, 4, woodMaterial);
                createWall(0, 4.5, -3, 4, 3, 0.3, woodMaterial);
                createWall(0, 4.5, 3, 4, 3, 0.3, woodMaterial);
                
                // Koridor duvarları (3. kat)
                createWall(-2, 7.5, 0, 0.3, 3, 4, woodMaterial);
                createWall(2, 7.5, 0, 0.3, 3, 4, woodMaterial);
                createWall(0, 7.5, -3, 4, 3, 0.3, woodMaterial);
                createWall(0, 7.5, 3, 4, 3, 0.3, woodMaterial);
                
                // ----- KAPILAR -----
                const doorMaterial = new THREE.MeshStandardMaterial({ color: 0x5d3a1a });
                
                // Giriş kapısı (ön)
                createDoor(-1.5, 1, 4.9, doorMaterial, 0);
                createDoor(1.5, 1, 4.9, doorMaterial, 0);
                
                // İç kapılar (1. kat)
                createDoor(-3.5, 1, -1, doorMaterial, Math.PI/2);
                createDoor(3.5, 1, -1, doorMaterial, Math.PI/2);
                createDoor(-3.5, 1, 1, doorMaterial, Math.PI/2);
                createDoor(3.5, 1, 1, doorMaterial, Math.PI/2);
                
                // İç kapılar (2. kat)
                createDoor(-3.5, 4, -1, doorMaterial, Math.PI/2);
                createDoor(3.5, 4, -1, doorMaterial, Math.PI/2);
                createDoor(-3.5, 4, 1, doorMaterial, Math.PI/2);
                createDoor(3.5, 4, 1, doorMaterial, Math.PI/2);
                
                // İç kapılar (3. kat)
                createDoor(-3.5, 7, -1, doorMaterial, Math.PI/2);
                createDoor(3.5, 7, -1, doorMaterial, Math.PI/2);
                createDoor(-3.5, 7, 1, doorMaterial, Math.PI/2);
                createDoor(3.5, 7, 1, doorMaterial, Math.PI/2);
                
                // ----- MERDİVENLER -----
                // 1. kattan 2. kata
                for (let i = 0; i < 8; i++) {
                    const step = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2, 0.2, 0.5),
                        woodMaterial
                    );
                    step.position.set(-4, 0.2 + i*0.35, 3);
                    step.rotation.y = Math.PI/2;
                    step.castShadow = true;
                    step.receiveShadow = true;
                    scene.add(step);
                }
                
                // 2. kattan 3. kata
                for (let i = 0; i < 8; i++) {
                    const step = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2, 0.2, 0.5),
                        woodMaterial
                    );
                    step.position.set(4, 3.2 + i*0.35, -3);
                    step.rotation.y = Math.PI/2;
                    step.castShadow = true;
                    step.receiveShadow = true;
                    scene.add(step);
                }
                
                // ----- EŞYALAR -----
                
                // Yataklar
                createBed(-3, 0.3, -2, 0x8b5a2b);
                createBed(3, 3.3, 2, 0x8b5a2b);
                createBed(-3, 6.3, -2, 0x8b5a2b);
                
                // Dolaplar
                createCabinet(-2, 0.8, 3, 0x5d3a1a);
                createCabinet(2, 3.8, -3, 0x5d3a1a);
                createCabinet(-2, 6.8, 3, 0x5d3a1a);
                
                // Masalar
                createTable(0, 0.5, 0, 2, 0.1, 1.5, 0x8b5a2b);
                createTable(0, 3.5, 0, 2, 0.1, 1.5, 0x8b5a2b);
                createTable(0, 6.5, 0, 2, 0.1, 1.5, 0x8b5a2b);
                
                // Sandalyeler
                createChair(-0.8, 0.3, -0.5, 0x5d3a1a);
                createChair(0.8, 0.3, -0.5, 0x5d3a1a);
                createChair(-0.8, 3.3, -0.5, 0x5d3a1a);
                createChair(0.8, 3.3, -0.5, 0x5d3a1a);
                
                // Kitaplıklar
                createBookshelf(-4, 1.5, -3, 0x8b5a2b);
                createBookshelf(4, 4.5, 3, 0x8b5a2b);
                createBookshelf(-4, 7.5, -3, 0x8b5a2b);
                
                // Lambalar
                createLamp(-2, 2.5, 2, 0xffaa33);
                createLamp(2, 5.5, -2, 0xffaa33);
                createLamp(-2, 8.5, 2, 0xffaa33);
                
                // Halılar
                createCarpet(0, 0.05, 0, 2, 1, 0xaa5533);
                createCarpet(0, 3.05, 0, 2, 1, 0xaa5533);
                createCarpet(0, 6.05, 0, 2, 1, 0xaa5533);
                
                // Tablolar (duvarda)
                createPainting(-4.8, 2, 0, 1.5, 1, 0xffaa88);
                createPainting(4.8, 5, 0, 1.5, 1, 0xffaa88);
                
                // Banyo (bodrum katı)
                createBathroom();
            }
            
            function createWall(x, y, z, w, h, d, material) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
                wall.position.set(x, y, z);
                wall.castShadow = true;
                wall.receiveShadow = true;
                scene.add(wall);
            }
            
            function createDoor(x, y, z, material, rotation) {
                const door = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 0.2), material);
                door.position.set(x, y, z);
                door.rotation.y = rotation;
                door.castShadow = true;
                door.receiveShadow = true;
                scene.add(door);
                
                const knob = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshStandardMaterial({ color: 0xffaa00 }));
                knob.position.set(
                    x + Math.cos(rotation) * 0.6,
                    y,
                    z + Math.sin(rotation) * 0.6
                );
                knob.castShadow = true;
                scene.add(knob);
            }
            
            function createBed(x, y, z, color) {
                const base = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 1.5), new THREE.MeshStandardMaterial({ color: color }));
                base.position.set(x, y + 0.2, z);
                base.castShadow = true;
                base.receiveShadow = true;
                scene.add(base);
                
                const mattress = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.3, 1.4), new THREE.MeshStandardMaterial({ color: 0xaa8866 }));
                mattress.position.set(x, y + 0.55, z);
                mattress.castShadow = true;
                mattress.receiveShadow = true;
                scene.add(mattress);
                
                const pillow = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.4), new THREE.MeshStandardMaterial({ color: 0xccaa88 }));
                pillow.position.set(x - 0.5, y + 0.7, z);
                pillow.castShadow = true;
                pillow.receiveShadow = true;
                scene.add(pillow);
            }
            
            function createCabinet(x, y, z, color) {
                const cabinet = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 0.8), new THREE.MeshStandardMaterial({ color: color }));
                cabinet.position.set(x, y + 1, z);
                cabinet.castShadow = true;
                cabinet.receiveShadow = true;
                scene.add(cabinet);
                
                const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.2), new THREE.MeshStandardMaterial({ color: 0xffaa00 }));
                handle.position.set(x + 0.5, y + 1, z + 0.4);
                handle.rotation.z = Math.PI/2;
                handle.castShadow = true;
                scene.add(handle);
            }
            
            function createTable(x, y, z, w, h, d, color) {
                const top = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: color }));
                top.position.set(x, y + h/2, z);
                top.castShadow = true;
                top.receiveShadow = true;
                scene.add(top);
                
                const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, y, 0.1), new THREE.MeshStandardMaterial({ color: color }));
                leg1.position.set(x - w/3, y/2, z - d/3);
                leg1.castShadow = true;
                leg1.receiveShadow = true;
                scene.add(leg1);
                
                const leg2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, y, 0.1), new THREE.MeshStandardMaterial({ color: color }));
                leg2.position.set(x + w/3, y/2, z - d/3);
                leg2.castShadow = true;
                leg2.receiveShadow = true;
                scene.add(leg2);
                
                const leg3 = new THREE.Mesh(new THREE.BoxGeometry(0.1, y, 0.1), new THREE.MeshStandardMaterial({ color: color }));
                leg3.position.set(x - w/3, y/2, z + d/3);
                leg3.castShadow = true;
                leg3.receiveShadow = true;
                scene.add(leg3);
                
                const leg4 = new THREE.Mesh(new THREE.BoxGeometry(0.1, y, 0.1), new THREE.MeshStandardMaterial({ color: color }));
                leg4.position.set(x + w/3, y/2, z + d/3);
                leg4.castShadow = true;
                leg4.receiveShadow = true;
                scene.add(leg4);
            }
            
            function createChair(x, y, z, color) {
                const seat = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.6), new THREE.MeshStandardMaterial({ color: color }));
                seat.position.set(x, y + 0.3, z);
                seat.castShadow = true;
                seat.receiveShadow = true;
                scene.add(seat);
                
                const back = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.1), new THREE.MeshStandardMaterial({ color: color }));
                back.position.set(x, y + 0.7, z - 0.25);
                back.castShadow = true;
                back.receiveShadow = true;
                scene.add(back);
                
                const leg1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), new THREE.MeshStandardMaterial({ color: color }));
                leg1.position.set(x - 0.2, y + 0.2, z - 0.2);
                leg1.castShadow = true;
                leg1.receiveShadow = true;
                scene.add(leg1);
                
                const leg2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), new THREE.MeshStandardMaterial({ color: color }));
                leg2.position.set(x + 0.2, y + 0.2, z - 0.2);
                leg2.castShadow = true;
                leg2.receiveShadow = true;
                scene.add(leg2);
                
                const leg3 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), new THREE.MeshStandardMaterial({ color: color }));
                leg3.position.set(x - 0.2, y + 0.2, z + 0.2);
                leg3.castShadow = true;
                leg3.receiveShadow = true;
                scene.add(leg3);
                
                const leg4 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), new THREE.MeshStandardMaterial({ color: color }));
                leg4.position.set(x + 0.2, y + 0.2, z + 0.2);
                leg4.castShadow = true;
                leg4.receiveShadow = true;
                scene.add(leg4);
            }
            
            function createBookshelf(x, y, z, color) {
                const shelf = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.5, 0.5), new THREE.MeshStandardMaterial({ color: color }));
                shelf.position.set(x, y + 1.25, z);
                shelf.castShadow = true;
                shelf.receiveShadow = true;
                scene.add(shelf);
                
                // Kitaplar
                for (let i = 0; i < 5; i++) {
                    const book = new THREE.Mesh(
                        new THREE.BoxGeometry(0.15, 0.6, 0.3),
                        new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
                    );
                    book.position.set(x - 0.3 + i*0.15, y + 1.8, z + 0.2);
                    book.castShadow = true;
                    book.receiveShadow = true;
                    scene.add(book);
                }
            }
            
            function createLamp(x, y, z, color) {
                const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.2), new THREE.MeshStandardMaterial({ color: 0x886644 }));
                base.position.set(x, y - 0.1, z);
                base.castShadow = true;
                base.receiveShadow = true;
                scene.add(base);
                
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8), new THREE.MeshStandardMaterial({ color: 0xaaaaaa }));
                pole.position.set(x, y + 0.3, z);
                pole.castShadow = true;
                pole.receiveShadow = true;
                scene.add(pole);
                
                const shade = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.3, 8), new THREE.MeshStandardMaterial({ color: 0xeeddcc }));
                shade.position.set(x, y + 0.7, z);
                shade.castShadow = true;
                shade.receiveShadow = true;
                scene.add(shade);
                
                const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshStandardMaterial({ color: color, emissive: 0x442200 }));
                bulb.position.set(x, y + 0.6, z);
                bulb.castShadow = true;
                scene.add(bulb);
            }
            
            function createCarpet(x, y, z, w, d, color) {
                const carpet = new THREE.Mesh(
                    new THREE.BoxGeometry(w, 0.05, d),
                    new THREE.MeshStandardMaterial({ color: color })
                );
                carpet.position.set(x, y, z);
                carpet.receiveShadow = true;
                scene.add(carpet);
            }
            
            function createPainting(x, y, z, w, h, color) {
                const frame = new THREE.Mesh(
                    new THREE.BoxGeometry(w + 0.1, h + 0.1, 0.05),
                    new THREE.MeshStandardMaterial({ color: 0x8b4513 })
                );
                frame.position.set(x, y, z);
                frame.castShadow = true;
                frame.receiveShadow = true;
                scene.add(frame);
                
                const canvas = new THREE.Mesh(
                    new THREE.BoxGeometry(w, h, 0.02),
                    new THREE.MeshStandardMaterial({ color: color })
                );
                canvas.position.set(x, y, z + 0.03);
                canvas.castShadow = true;
                canvas.receiveShadow = true;
                scene.add(canvas);
            }
            
            function createBathroom() {
                // Bodrum katında banyo
                const bathPos = { x: 0, y: -2.5, z: 0 };
                
                // Küvet
                const tub = new THREE.Mesh(
                    new THREE.BoxGeometry(2, 0.8, 1.2),
                    new THREE.MeshStandardMaterial({ color: 0xcccccc })
                );
                tub.position.set(bathPos.x, bathPos.y + 0.4, bathPos.z);
                tub.castShadow = true;
                tub.receiveShadow = true;
                scene.add(tub);
                
                // Klozet
                const toilet = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.5, 0.5),
                    new THREE.MeshStandardMaterial({ color: 0xffffff })
                );
                toilet.position.set(bathPos.x + 1.5, bathPos.y + 0.25, bathPos.z - 1);
                toilet.castShadow = true;
                toilet.receiveShadow = true;
                scene.add(toilet);
                
                // Lavabo
                const sink = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.5, 0.6, 0.3),
                    new THREE.MeshStandardMaterial({ color: 0xffffff })
                );
                sink.position.set(bathPos.x - 1.5, bathPos.y + 0.15, bathPos.z - 1);
                sink.castShadow = true;
                sink.receiveShadow = true;
                scene.add(sink);
            }
            
            // -------------------- OYUN DÖNGÜSÜ --------------------
            function update() {
                // Hareket
                let moveX = 0, moveZ = 0;
                if (keys['w'] || keys['arrowup']) moveZ += 0.15;
                if (keys['s'] || keys['arrowdown']) moveZ -= 0.15;
                if (keys['a'] || keys['arrowleft']) moveX -= 0.15;
                if (keys['d'] || keys['arrowright']) moveX += 0.15;
                
                if (joystickActive) {
                    moveX += moveDirection.x * 0.15;
                    moveZ += moveDirection.z * 0.15;
                }
                
                if (moveX !== 0 || moveZ !== 0) {
                    const angle = camera.rotation.y;
                    const sin = Math.sin(angle);
                    const cos = Math.cos(angle);
                    
                    let newX = player.x + (moveX * cos - moveZ * sin);
                    let newZ = player.z + (moveX * sin + moveZ * cos);
                    
                    // Sınırlar
                    if (Math.abs(newX) < 8 && Math.abs(newZ) < 8) {
                        player.x = newX;
                        player.z = newZ;
                    }
                    
                    camera.position.x = player.x;
                    camera.position.z = player.z;
                }
                
                torchLight.position.copy(camera.position);
            }
            
            function animate() {
                requestAnimationFrame(animate);
                update();
                renderer.render(scene, camera);
            }
            
            function onResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        })();
    </script>
</body>
</html>
